<!DOCTYPE html>
<html lang="fr">
<head>
<meta charset="UTF-8">
<title>Mémoire numérique</title>

<style>
body{
    margin:0;
    background:black;
    font-family: "MS Sans Serif", Arial, sans-serif;
    color:white;
}

/* Bureau */
.desktop{
    width:100vw;
    height:100vh;
    display:flex;
    flex-wrap:wrap;
    padding:30px;
    gap:40px;
    align-content:flex-start;
}

/* Icônes */
.icon{
    width:90px;
    text-align:center;
    cursor:pointer;
    opacity:0.9;
    font-size:13px;
}

.icon:hover{
    opacity:1;
}

.icon svg{
    width:60px;
    height:60px;
}

/* Fenêtre dossier */
.window{
    position:fixed;
    bottom:70px;
    right:40px;
    width:320px;
    background:#111;
    border:2px solid white;
    display:none;
    animation: subtleMove 6s infinite ease-in-out;
}

/* Animation fenêtre */
@keyframes subtleMove{
    0%{opacity:0.95;}
    50%{opacity:1;}
    100%{opacity:0.95;}
}

/* Barre titre */
.title-bar{
    background:#000080;
    color:white;
    padding:4px 8px;
    display:flex;
    justify-content:space-between;
    font-weight:bold;
}

/* Boutons fenêtre */
.window-buttons span{
    margin-left:8px;
    cursor:pointer;
}

/* Contenu */
.content{
    padding:20px;
    font-size:14px;
    line-height:1.4;
}

/* Curseur système */
.cursor{
    display:inline-block;
    width:6px;
    height:14px;
    background:white;
    margin-left:4px;
    animation: blink 1s infinite;
}

@keyframes blink{
    0%,50%{opacity:1;}
    51%,100%{opacity:0;}
}

/* Ligne système */
.system-line{
    margin-top:15px;
    font-size:12px;
    opacity:0.6;
}

/* Taskbar */
.taskbar{
    position:fixed;
    bottom:0;
    width:100%;
    height:40px;
    background:#c0c0c0;
    border-top:2px solid white;
    display:flex;
    align-items:center;
    padding-left:10px;
    color:black;
    font-weight:bold;
}

.start-button{
    background:#d0d0d0;
    border:2px solid black;
    padding:4px 12px;
    margin-right:15px;
}

/* Icônes dossier */
.folder-svg{
    fill:#111;
    stroke:white;
    stroke-width:3;
}
</style>
</head>

<body>

<div class="desktop">

<div class="icon" onclick="openFolder('Album photo')">
<svg viewBox="0 0 64 64">
<path class="folder-svg" d="M8 18H26L32 24H56V52H8V18Z"/>
<path d="M8 24H56V52H8V24Z"/>
</svg>
Album photo
</div>

<div class="icon" onclick="openFolder('Vacances 2025')">
<svg viewBox="0 0 64 64">
<path class="folder-svg" d="M8 20H26L32 26H56V52H8V20Z"/>
<path d="M8 26H56V52H8V26Z"/>
</svg>
Vacances 2025
</div>

<div class="icon" onclick="openFolder('Contact')">
<svg viewBox="0 0 64 64">
<path class="folder-svg" d="M14 18H50V50H14Z"/>
<path d="M22 18V12H42V18"/>
</svg>
Contact
</div>

<div class="icon" onclick="openFolder('Documents perso')">
<svg viewBox="0 0 64 64">
<path class="folder-svg" d="M8 20H26L32 26H56V52H8V20Z"/>
<path d="M8 26H56V52H8V26Z"/>
</svg>
Documents perso
</div>

<!-- Corbeille -->
<div class="icon" onclick="openFolder('Corbeille')">
<svg viewBox="0 0 64 64" fill="none" stroke="white" stroke-width="3">
<rect x="18" y="20" width="28" height="30" rx="2"/>
<path d="M18 24H46"/>
<path d="M26 20V16H38V20"/>
</svg>
Corbeille
</div>

</div>

<!-- Fenêtre dossier -->
<div class="window" id="folderWindow">
<div class="title-bar">
<span id="folderTitle">Dossier</span>

<span class="window-buttons">
<span onclick="closeFolder()">✕</span>
</span>
</div>

<div class="content">
<p>Ce dossier est vide<span class="cursor"></span></p>

<div class="system-line">
Accès mémoire — statut : archivage silencieux
<br>
Dernière modification : <span id="date"></span>
</div>

</div>
</div>

<!-- Taskbar -->
<div class="taskbar">
<div class="start-button">▶ Start</div>
Projet mémoire numérique
</div>

<script>
function openFolder(name){
    document.getElementById("folderTitle").innerText = name;
    document.getElementById("folderWindow").style.display = "block";

    document.getElementById("date").innerText =
    new Date().toLocaleDateString("fr-FR");
}

function closeFolder(){
    document.getElementById("folderWindow").style.display = "none";
}
</script>

</body>
</html>
